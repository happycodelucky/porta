min_version = "2025.7.12"

[tools]
rust = "1.93.1"
shellcheck = "latest"
"cargo:cargo-audit" = "latest"
"cargo:cargo-deb" = "latest"

[tasks.toolchain]
description = "Materialize the pinned Rust toolchain and its components"
# `check` runs fmt, lint, and test in parallel. Where the pinned toolchain is not
# installed yet, each of those makes rustup fetch it, and the concurrent installs
# race on a shared download directory: one renames the partial file and the
# others fail with "could not rename 'downloaded' file". Depending on this task
# first makes rustup do the work once, serially. Each command below pulls a
# different component, so none is left to be fetched under parallelism.
run = ["rustc --version", "cargo fmt --version", "cargo clippy --version"]

[tasks.fmt]
description = "Check Rust formatting"
depends = ["toolchain"]
run = "cargo fmt --all --check"

[tasks.format]
description = "Format Rust sources"
depends = ["toolchain"]
run = "cargo fmt --all"

[tasks.lint]
description = "Run Clippy with warnings denied"
depends = ["toolchain"]
run = "cargo clippy --all-targets --all-features -- -D warnings"

[tasks.lint-stable]
description = "Run Clippy on the current stable Rust toolchain"
run = "mise exec rust@stable -- cargo clippy --all-targets --all-features -- -D warnings"

[tasks.test]
description = "Run the Rust test suite"
depends = ["toolchain"]
run = "cargo test --all-features"

[tasks.shellcheck]
description = "Lint shell automation"
run = "shellcheck scripts/*.sh"

[tasks.check]
description = "Run formatting, lint, tests, and shell automation checks"
depends = ["fmt", "lint", "test", "shellcheck"]

[tasks.build]
description = "Build a validated release binary"
depends = ["check"]
run = "cargo build --release --locked"

[tasks.install]
description = "Install porta through Cargo"
depends = ["check"]
run = "cargo install --path . --locked --force"

[tasks.smoke]
description = "Run the isolated end-to-end CLI smoke test"
depends = ["build"]
run = "bash scripts/smoke.sh"

[tasks.deb]
description = "Package the release binary as a Debian package"
depends = ["build"]
run = "cargo deb --no-build"

[tasks.audit]
description = "Audit Rust dependencies for known vulnerabilities"
run = "cargo audit"

[tasks.package]
description = "Validate the crate package contents"
depends = ["check"]
run = "cargo package --locked --allow-dirty"
