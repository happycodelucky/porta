min_version = "2025.7.12"

[tools]
rust = "1.93.1"
shellcheck = "latest"
"cargo:cargo-audit" = "latest"
"cargo:cargo-deb" = "latest"

[tasks.toolchain]
description = "Materialize the pinned Rust toolchain with rustfmt and clippy"
# `check` runs fmt, lint, and test in parallel. mise installs the pinned toolchain
# through rustup with a minimal profile that omits rustfmt and clippy, and
# `cargo fmt`/`cargo clippy` error rather than installing them on demand. When the
# base toolchain is not present yet, the parallel cargo invocations also race to
# install it and collide in rustup's shared download directory. This task runs
# first, serially, installing the toolchain and both components in one idempotent
# step so everything is present before anything runs in parallel. RUSTUP_TOOLCHAIN
# is set to the pinned version by mise.
run = "rustup toolchain install \"$RUSTUP_TOOLCHAIN\" --component rustfmt --component clippy --no-self-update --profile minimal"

[tasks.fmt]
description = "Check Rust formatting"
depends = ["toolchain"]
run = "cargo fmt --all --check"

[tasks.format]
description = "Format Rust sources"
depends = ["toolchain"]
run = "cargo fmt --all"

[tasks.lint]
description = "Run Clippy with warnings denied"
depends = ["toolchain"]
run = "cargo clippy --all-targets --all-features -- -D warnings"

[tasks.lint-stable]
description = "Run Clippy on the current stable Rust toolchain"
run = "mise exec rust@stable -- cargo clippy --all-targets --all-features -- -D warnings"

[tasks.test]
description = "Run the Rust test suite"
depends = ["toolchain"]
run = "cargo test --all-features"

[tasks.shellcheck]
description = "Lint shell automation"
run = "shellcheck scripts/*.sh"

[tasks.check]
description = "Run formatting, lint, tests, and shell automation checks"
depends = ["fmt", "lint", "test", "shellcheck"]

[tasks.build]
description = "Build a validated release binary"
depends = ["check"]
run = "cargo build --release --locked"

[tasks.install]
description = "Install porta through Cargo"
depends = ["check"]
run = "cargo install --path . --locked --force"

[tasks.smoke]
description = "Run the isolated end-to-end CLI smoke test"
depends = ["build"]
run = "bash scripts/smoke.sh"

[tasks.deb]
description = "Package the release binary as a Debian package"
depends = ["build"]
run = "cargo deb --no-build"

[tasks.audit]
description = "Audit Rust dependencies for known vulnerabilities"
run = "cargo audit"

[tasks.package]
description = "Validate the crate package contents"
depends = ["check"]
run = "cargo package --locked --allow-dirty"
